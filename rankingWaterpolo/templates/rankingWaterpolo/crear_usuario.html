{% extends 'rankingWaterpolo/base.html' %}
{% load static %}

{% block content %}
<div class="max-w-2xl mx-auto py-12 px-4 animate-fade-in mb-24">
    
    <div class="mb-8 border-b border-slate-200 pb-4">
        <a href="{% url 'gestionar_usuarios' %}" class="text-blue-600 font-bold text-sm hover:underline mb-2 inline-flex items-center gap-1"><i class="ph ph-arrow-left"></i> Volver a la lista</a>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">
            Registrar <span class="text-blue-600">Nuevo Usuario</span>
        </h1>
    </div>

    <form method="POST" class="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 relative overflow-hidden">
        {% csrf_token %}
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-600 to-cyan-500"></div>

        <div class="mb-6">
            <label class="block text-slate-700 font-bold mb-2 text-sm uppercase tracking-wide">Nombre de Usuario</label>
            <input type="text" name="username" placeholder="Ej: waterpolo_fan" required
                   class="w-full bg-slate-50 border border-slate-200 text-slate-900 font-semibold rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all">
        </div>

        <div class="mb-6">
            <label class="block text-slate-700 font-bold mb-2 text-sm uppercase tracking-wide">Correo Electrónico</label>
            <input type="email" name="email" placeholder="usuario@correo.com"
                   class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all">
        </div>

        <div class="mb-8">
            <label class="block text-slate-700 font-bold mb-2 text-sm uppercase tracking-wide">Contraseña Provisional</label>
            <div class="relative">
                <i class="ph ph-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="password" name="password" required placeholder="Mínimo 8 caracteres"
                       class="w-full bg-slate-50 border border-slate-200 text-slate-900 rounded-xl pl-11 pr-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all">
            </div>
            <p class="text-[10px] text-slate-400 mt-2 uppercase font-bold tracking-tighter italic text-right">Se recomienda cambiarla tras el primer acceso</p>
        </div>

        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8 space-y-4">
            <h3 class="font-bold text-slate-800 border-b border-slate-200 pb-2 mb-4">Configuración de Cuenta</h3>
            
            <label class="flex items-center gap-3 cursor-pointer group">
                <input type="checkbox" name="is_active" checked
                       class="w-5 h-5 text-emerald-500 rounded border-slate-300 focus:ring-emerald-500 cursor-pointer">
                <div>
                    <span class="font-bold text-slate-700 group-hover:text-emerald-600 transition-colors">Usuario Activo</span>
                    <p class="text-xs text-slate-500">¿Puede entrar a la plataforma nada más ser creado?</p>
                </div>
            </label>

            <label class="flex items-center gap-3 cursor-pointer group mt-4">
                <input type="checkbox" name="is_staff" 
                       class="w-5 h-5 text-blue-500 rounded border-slate-300 focus:ring-blue-500 cursor-pointer">
                <div>
                    <span class="font-bold text-slate-700 group-hover:text-blue-600 transition-colors">Acceso al Staff</span>
                    <p class="text-xs text-slate-500">Permitir que este usuario gestione categorías y equipos.</p>
                </div>
            </label>
        </div>

        <div class="flex gap-4 pt-4 border-t border-slate-100">
            <button type="submit" class="flex-1 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-700 hover:to-blue-600 text-white font-bold py-3 px-6 rounded-xl transition shadow-md shadow-blue-200/50 flex items-center justify-center gap-2 transform active:scale-95">
                <i class="ph ph-user-plus text-xl"></i> Crear Usuario
            </button>
            <a href="{% url 'gestionar_usuarios' %}" class="bg-white border border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-3 px-6 rounded-xl transition flex items-center justify-center text-center">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
