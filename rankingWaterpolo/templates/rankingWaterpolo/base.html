{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WP Ranking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .pool-gradient {
            background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <nav class="sticky top-0 z-50 glass-effect border-b border-blue-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="{% url 'home' %}" class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">W</div>
                        <span class="text-xl font-black text-blue-900 tracking-tighter">WP RANKING</span>
                    </a>
                </div>

                <div class="flex items-center gap-6">
                    {% if user.is_authenticated %}

                        {% if user.is_staff %}
                            <a href="{% url 'estadisticas' %}" class="text-slate-500 hover:text-blue-600 font-bold transition flex items-center gap-1">
                                <i class="ph ph-chart-bar text-lg"></i> Estadísticas
                            </a>

                            <a href="#" class="text-xs font-bold text-amber-600 bg-amber-100 px-3 py-1 rounded-full border border-amber-200 hover:bg-amber-200 transition">
                                <i class="ph ph-crown"></i> MODO ADMIN
                            </a>
                            <a href="{% url 'home' %}?section=gestion" class="text-slate-500 hover:text-blue-600 font-bold transition">
                                Gestión
                            </a>
                        {% endif %}
                        <div class="flex items-center gap-3 border-l border-slate-200 pl-6">
                            <span class="text-sm font-bold text-slate-700">{{ user.username }}</span>
                            <a href="{% url 'logout' %}" class="text-slate-400 hover:text-red-500 transition-colors" title="Cerrar Sesión">
                                <i class="ph ph-sign-out text-xl"></i>
                            </a>
                        </div>
                    {% else %}
                        <a href="{% url 'login' %}" class="text-sm font-bold text-blue-600">Iniciar Sesión</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
