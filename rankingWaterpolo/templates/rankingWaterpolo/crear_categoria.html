{% extends 'rankingWaterpolo/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
    
    <div class="mb-8 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-600 mb-4">
            <i class="ph ph-plus text-3xl"></i>
        </div>
        <h1 class="text-3xl font-black text-slate-800">Nueva Categoría</h1>
        <p class="text-slate-500">Añade una nueva liga o competición al sistema.</p>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-lg border border-slate-100">
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <div class="space-y-4">
                
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Nombre de la Categoría</label>
                    {{ form.nombre }}
                    {% if form.nombre.errors %}
                        <p class="text-red-500 text-xs mt-1">{{ form.nombre.errors.0 }}</p>
                    {% endif %}
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Temporada</label>
                    {{ form.temporada }}
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Imagen / Logo</label>
                    {{ form.imagen }}
                </div>

            </div>

            <div class="pt-6 flex items-center gap-4 border-t border-slate-50 mt-6">
                <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition duration-300 flex items-center justify-center gap-2">
                    <i class="ph ph-floppy-disk"></i> Guardar Categoría
                </button>
                
                <a href="{% url 'home' %}" class="px-6 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
