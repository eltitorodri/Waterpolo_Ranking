{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WP Ranking - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'ranking/css/login.css' %}">
</head>
<body class="opacity-0 transition-opacity duration-500">

    <div id="bigWave" class="big-wave-transition"></div>

    <div class="pool-container">
        <div class="wave-layer layer-1"></div>
        <div class="wave-layer layer-2"></div>
    </div>

    <div id="mainFloat" class="float-animator" style="opacity: 0;">
        <div class="lifebuoy-ring">
            <div class="white-tape tape-top"></div>
            <div class="white-tape tape-bottom"></div>
            <div class="white-tape tape-left"></div>
            <div class="white-tape tape-right"></div>

            <div class="form-circle">
                <div class="turbo-grip"></div>
                <div class="form-content">
                    <h1 class="text-3xl font-black italic text-black mb-2 drop-shadow-sm">
                        WP<br><span class="text-xl">RANKING</span>
                    </h1>

                    <form method="POST">
                        {% csrf_token %}
                        <input type="text" name="username" placeholder="USUARIO" required class="turbo-input">

                        <div class="password-wrapper">
                            <input type="password" name="password" id="passwordInput" placeholder="CONTRASEÑA" required class="turbo-input">
                            <button type="button" class="eye-btn" onclick="togglePassword()">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>

                        {% if messages %}
                            {% for message in messages %}
                                <div class="text-red-600 text-[10px] font-bold uppercase mb-1">{{ message }}</div>
                            {% endfor %}
                        {% endif %}

                        <button type="submit" class="turbo-btn">Entrar</button>
                    </form>

                    <div class="mt-4">
                        <a href="javascript:void(0)" onclick="goToSignup(event)" class="text-[10px] font-black text-black/70 hover:text-black uppercase tracking-widest border-b border-black/20 pb-1 transition-colors hover:border-black">
                            ¿No tienes cuenta? Regístrate
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'ranking/js/login.js' %}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.body.classList.remove('opacity-0');
            const floater = document.getElementById('mainFloat');

            setTimeout(() => {
                floater.style.opacity = "1";
                floater.classList.add('float-in-surge');
            }, 100);
        });

        function goToSignup(event) {
            event.preventDefault();
            const wave = document.getElementById('bigWave');
            const floater = document.getElementById('mainFloat');

            // Ola desde la derecha
            wave.classList.add('wave-sweep');

            // Floater se va hacia la izquierda con suavidad
            floater.classList.add('float-out');

            // Redirección al final de la animación
            setTimeout(() => {
                window.location.href = "{% url 'registro' %}";
            }, 1000);
        }
    </script>
</body>
</html>
