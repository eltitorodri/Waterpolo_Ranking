{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waterpolo Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'ranking/css/login.css' %}">
</head>
<body>

    <div class="pool-container">
        <div class="wave-layer layer-1"></div>
        <div class="wave-layer layer-2"></div>
    </div>

    <div class="float-animator">
        <div class="lifebuoy-ring">
            <div class="white-tape tape-top"></div>
            <div class="white-tape tape-bottom"></div>
            <div class="white-tape tape-left"></div>
            <div class="white-tape tape-right"></div>

            <div class="form-circle">
                <div class="turbo-grip"></div>

                <div class="form-content">
                    <h1 class="text-3xl font-black italic text-black leading-none mb-2 drop-shadow-sm">
                        WP<br><span class="text-xl">RANKING</span>
                    </h1>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="w-full">
                            <input type="text" name="nickname" placeholder="USUARIO" required class="turbo-input">
                        </div>

                        <div class="password-wrapper">
                            <input type="password" name="password" id="passwordInput" placeholder="CONTRASEÑA" required class="turbo-input">

                            <button type="button" class="eye-btn" onclick="togglePassword()">
                                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                                    <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd" />
                                </svg>
                            </button>
                        </div>

                        {% if messages %}
                            {% for message in messages %}
                                <div class="bg-red-600 text-white text-[10px] p-1 mb-2 rounded font-bold">{{ message }}</div>
                            {% endfor %}
                        {% endif %}

                        <button type="submit" class="turbo-btn">
                            Entrar
                        </button>
                    </form>

                    <div class="mt-4 footer-link">
                        <a href="#" onclick="splashAction(event)" class="text-[10px] font-black text-black/70 hover:text-black uppercase tracking-widest border-b border-black/20 pb-1">
                            Crear Cuenta
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'ranking/js/login.js' %}"></script>

</body>
</html>
